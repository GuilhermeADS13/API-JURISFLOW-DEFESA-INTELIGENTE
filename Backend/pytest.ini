[pytest]
# Inclui raiz do backend para imports absolutos em `App.*`.
pythonpath = .
# Pasta oficial da suite de testes.
testpaths = tests
# Executa em modo quiet para output mais limpo no terminal.
addopts = -q
# Suprime warnings cosmeticos do Pydantic 2.13 emitidos pelo FastAPI ao criar
# TypeAdapter para Field(alias=...) fora do contexto do modelo. Comportamento
# nao afeta runtime — corrigido em versoes futuras de FastAPI/Pydantic.
filterwarnings =
    ignore::pydantic.warnings.UnsupportedFieldAttributeWarning
