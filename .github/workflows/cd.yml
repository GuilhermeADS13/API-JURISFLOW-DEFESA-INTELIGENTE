name: CD – Deploy no Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy do frontend no Vercel
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Front end/vite-project

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4.2.2

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4.2.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: "Front end/vite-project/package-lock.json"

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy no Vercel (produção)
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
