name: CI – AutoJuri (Testes + Build)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  testes:
    name: Testes unitários e de integração
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    env:
      DATABASE_URL: postgresql://test:test@localhost/test_db
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_NAME: test_db
      DATABASE_USER: test
      DATABASE_PASSWORD: test
      DATABASE_SSLMODE: disable
      SUPABASE_URL: ""
      SUPABASE_PUBLISHABLE_KEY: ""
      SESSION_COOKIE_SECURE: "false"
      RATE_LIMIT_TRUST_FORWARDED: "false"
      LOG_LEVEL: WARNING

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Backend/requirements-dev.txt

      - name: Instalar dependências
        run: pip install -r requirements-dev.txt

      - name: Executar testes com relatório
        run: |
          pytest tests/ \
            --tb=short \
            --junitxml=relatorio-testes.xml \
            -v

      - name: Publicar resultado dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: Backend/relatorio-testes.xml
          retention-days: 30

  build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: testes

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t autojuri-backend:${{ github.sha }} ./Backend
